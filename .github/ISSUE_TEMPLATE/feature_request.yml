name: Feature Request
description: Suggest an idea for AgentForge
title: "[Feature]: "
labels: ["enhancement"]
assignees:
  - octocat
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! We appreciate your input. Please fill out the details below.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature you'd like
      placeholder: I would like to see...
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Solved
      description: Describe the problem this feature would solve. Ex. I'm always frustrated when [...]
      placeholder: This would help me to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like, including any implementation details you have in mind
      placeholder: One way to implement this would be...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered
      placeholder: I also thought about...
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, screenshots, mockups, or examples about the feature request here
      placeholder: Here are some references...
    validations:
      required: false

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How impactful would this feature be for you?
      options:
        - Critical — I cannot use AgentForge without this
        - High — This would significantly improve my workflow
        - Medium — Nice to have
        - Low — Minor improvement
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I have searched the existing issues and this feature has not been requested
          required: true
        - label: I have checked the roadmap and this is not already planned
          required: true
        - label: I would be willing to help implement this feature
          required: false
