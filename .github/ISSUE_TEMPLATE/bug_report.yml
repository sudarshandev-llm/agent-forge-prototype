name: Bug Report
description: Create a report to help us improve AgentForge
title: '[Bug]: '
labels: ['bug', 'triage']
assignees:
  - octocat
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is
      placeholder: Tell us what happened...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: I expected that...
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened instead?
      placeholder: Instead, I saw...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs and Error Messages
      description: Please copy and paste any relevant log output, error messages, or stack traces
      placeholder: Paste logs here...
      render: shell
    validations:
      required: false

  - type: dropdown
    id: version
    attributes:
      label: Version
      description: What version of AgentForge are you running?
      options:
        - 1.0.0 (latest)
        - 0.x (pre-release)
        - Development (main branch)
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: What Node.js version are you using?
      placeholder: 'e.g., 20.11.0'
    validations:
      required: false

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
        - Docker (container)
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser (if applicable)
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
        - N/A
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment Details
      description: Any additional environment details (database type, deployment method, etc.)
      placeholder: 'e.g., PostgreSQL 15, Redis 7, deployed on Railway'
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I have searched the existing issues and this bug has not been reported
          required: true
        - label: I have checked the documentation and found no solution
          required: true
        - label: I am running the latest version of AgentForge
          required: false
