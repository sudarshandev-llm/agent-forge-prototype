version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: agentforge-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agentforge
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: agentforge-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
      target: development
    container_name: agentforge-api
    ports:
      - '4000:4000'
      - '9229:9229'
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agentforge
      REDIS_URL: redis://redis:6379
    volumes:
      - ../../apps/api/src:/app/apps/api/src
      - ../../packages:/app/packages
      - ../../node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm run dev -w apps/api
    stdin_open: true
    tty: true

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
      target: development
    container_name: agentforge-worker
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/agentforge
      REDIS_URL: redis://redis:6379
    volumes:
      - ../../apps/worker/src:/app/apps/worker/src
      - ../../packages:/app/packages
      - ../../node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: pnpm run dev -w apps/worker
    stdin_open: true
    tty: true

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
      target: development
    container_name: agentforge-web
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_WS_URL: http://localhost:4000
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
    volumes:
      - ../../apps/web/src:/app/apps/web/src
      - ../../apps/web/public:/app/apps/web/public
      - ../../packages:/app/packages
      - ../../node_modules:/app/node_modules
    depends_on:
      api:
        condition: service_started
    command: pnpm run dev -w apps/web
    stdin_open: true
    tty: true

volumes:
  postgres-data:
  redis-data:
