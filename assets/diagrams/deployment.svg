<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#141832"/>
    </linearGradient>
    <linearGradient id="github" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d333b"/>
      <stop offset="100%" stop-color="#444c56"/>
    </linearGradient>
    <linearGradient id="ci" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="docker" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0db7ed"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="vercel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000"/>
      <stop offset="100%" stop-color="#333"/>
    </linearGradient>
    <linearGradient id="railway" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="render" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="pg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#336791"/>
      <stop offset="100%" stop-color="#4c9bd4"/>
    </linearGradient>
    <linearGradient id="redis" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="monitor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="grafana" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f46800"/>
      <stop offset="100%" stop-color="#ff7843"/>
    </linearGradient>
    <linearGradient id="envProd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f87171"/>
    </linearGradient>
    <linearGradient id="envStag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="envDev" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="900" fill="url(#bg)"/>

  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e2448" stroke-width="0.5"/>
  </pattern>
  <rect width="1200" height="900" fill="url(#grid)" opacity="0.5"/>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="20" font-weight="bold" letter-spacing="2">AGENTFORGE DEPLOYMENT ARCHITECTURE</text>
  <line x1="300" y1="45" x2="900" y2="45" stroke="#6366f1" stroke-width="1" opacity="0.5"/>

  <!-- ==================== SOURCE CONTROL ==================== -->
  <text x="70" y="80" fill="#6366f1" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="1">SOURCE</text>
  <line x1="70" y1="85" x2="140" y2="85" stroke="#6366f1" stroke-width="1" opacity="0.3"/>

  <rect x="60" y="95" width="200" height="60" rx="12" fill="url(#github)" stroke="#444c56" stroke-width="1" filter="url(#shadow)"/>
  <text x="160" y="120" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">🐙 GitHub</text>
  <text x="160" y="138" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">monorepo · agentforge</text>
  <text x="160" y="150" text-anchor="middle" fill="#8b949e" font-family="monospace" font-size="9">main · develop · feat/*</text>

  <!-- Arrow: GitHub -> CI/CD -->
  <line x1="260" y1="125" x2="340" y2="125" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="300" y="118" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">push / PR</text>

  <!-- ==================== CI/CD ==================== -->
  <text x="370" y="80" fill="#6366f1" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="1">CI/CD PIPELINE</text>
  <line x1="370" y1="85" x2="510" y2="85" stroke="#6366f1" stroke-width="1" opacity="0.3"/>

  <rect x="340" y="95" width="230" height="60" rx="12" fill="url(#ci)" filter="url(#shadow)"/>
  <text x="455" y="118" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">⚡ GitHub Actions CI/CD</text>
  <text x="455" y="138" text-anchor="middle" fill="#c7d2fe" font-family="monospace" font-size="9">Lint · Test · Build · Deploy</text>

  <!-- ==================== ENVIRONMENTS ==================== -->
  <text x="70" y="195" fill="#6366f1" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="1">ENVIRONMENTS</text>
  <line x1="70" y1="200" x2="200" y2="200" stroke="#6366f1" stroke-width="1" opacity="0.3"/>

  <rect x="60" y="210" width="80" height="36" rx="8" fill="url(#envDev)" filter="url(#shadow)" opacity="0.85"/>
  <text x="100" y="233" text-anchor="middle" fill="#fff" font-family="monospace" font-size="9" font-weight="bold">DEV</text>

  <rect x="155" y="210" width="80" height="36" rx="8" fill="url(#envStag)" filter="url(#shadow)" opacity="0.85"/>
  <text x="195" y="233" text-anchor="middle" fill="#fff" font-family="monospace" font-size="9" font-weight="bold">STAGING</text>

  <rect x="250" y="210" width="80" height="36" rx="8" fill="url(#envProd)" filter="url(#shadow)" opacity="0.85"/>
  <text x="290" y="233" text-anchor="middle" fill="#fff" font-family="monospace" font-size="9" font-weight="bold">PRODUCTION</text>

  <!-- Arrow: CI/CD -> Docker -->
  <line x1="455" y1="155" x2="455" y2="220" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="455" y1="220" x2="390" y2="220" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="455" y1="220" x2="330" y2="220" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ==================== DOCKER BUILD ==================== -->
  <text x="680" y="80" fill="#6366f1" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="1">CONTAINERIZATION</text>
  <line x1="680" y1="85" x2="840" y2="85" stroke="#6366f1" stroke-width="1" opacity="0.3"/>

  <rect x="630" y="95" width="220" height="60" rx="12" fill="url(#docker)" filter="url(#shadow)"/>
  <text x="740" y="118" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">🐳 Docker Build &amp; Push</text>
  <text x="740" y="138" text-anchor="middle" fill="#e0f2fe" font-family="monospace" font-size="9">ghcr.io/agentforge/*:latest</text>

  <!-- Arrow: CI/CD -> Docker Build -->
  <line x1="570" y1="125" x2="630" y2="125" stroke="#6366f1" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow: Docker -> Deploy targets -->
  <line x1="740" y1="155" x2="740" y2="210" stroke="#0db7ed" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M 740 210 L 200 280" stroke="#0db7ed" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M 740 210 L 500 280" stroke="#0db7ed" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>
  <path d="M 740 210 L 800 280" stroke="#0db7ed" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.6"/>

  <!-- ==================== DEPLOYMENT TARGETS ==================== -->
  <text x="70" y="280" fill="#6366f1" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="1">DEPLOYMENT TARGETS</text>
  <line x1="70" y1="285" x2="250" y2="285" stroke="#6366f1" stroke-width="1" opacity="0.3"/>

  <!-- Vercel -->
  <rect x="60" y="295" width="260" height="70" rx="10" fill="url(#vercel)" stroke="#333" stroke-width="1" filter="url(#shadow)"/>
  <text x="200" y="318" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">▲ Vercel</text>
  <text x="200" y="335" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">Frontend · Next.js SSR</text>
  <text x="200" y="350" text-anchor="middle" fill="#888" font-family="monospace" font-size="9">Edge Functions</text>

  <!-- Railway -->
  <rect x="370" y="295" width="260" height="70" rx="10" fill="url(#railway)" filter="url(#shadow)"/>
  <text x="500" y="318" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">🚂 Railway</text>
  <text x="500" y="335" text-anchor="middle" fill="#ddd6fe" font-family="monospace" font-size="9">API · Express Gateway</text>
  <text x="500" y="350" text-anchor="middle" fill="#ddd6fe" font-family="monospace" font-size="9">Microservices</text>

  <!-- Render -->
  <rect x="680" y="295" width="260" height="70" rx="10" fill="url(#render)" filter="url(#shadow)"/>
  <text x="810" y="318" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">⚡ Render</text>
  <text x="810" y="335" text-anchor="middle" fill="#d1fae5" font-family="monospace" font-size="9">Background Workers</text>
  <text x="810" y="350" text-anchor="middle" fill="#d1fae5" font-family="monospace" font-size="9">BullMQ Consumers</text>

  <!-- ==================== DATABASES ==================== -->
  <text x="70" y="420" fill="#6366f1" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="1">DATA STORES</text>
  <line x1="70" y1="425" x2="190" y2="425" stroke="#6366f1" stroke-width="1" opacity="0.3"/>

  <!-- Supabase / PostgreSQL -->
  <rect x="60" y="440" width="260" height="80" rx="10" fill="url(#pg)" filter="url(#shadow)"/>
  <text x="190" y="463" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">🐘 Supabase (PostgreSQL)</text>
  <text x="190" y="480" text-anchor="middle" fill="#bfdbfe" font-family="monospace" font-size="9">Agents · Users · Workflows</text>
  <text x="190" y="495" text-anchor="middle" fill="#bfdbfe" font-family="monospace" font-size="9">Executions · Audit logs</text>
  <text x="190" y="510" text-anchor="middle" fill="#bfdbfe" font-family="monospace" font-size="9">Row-level security</text>

  <!-- Redis -->
  <rect x="370" y="440" width="260" height="80" rx="10" fill="url(#redis)" filter="url(#shadow)"/>
  <text x="500" y="463" text-anchor="middle" fill="#fff" font-family="monospace" font-size="13" font-weight="bold">⚡ Redis</text>
  <text x="500" y="480" text-anchor="middle" fill="#fecaca" font-family="monospace" font-size="9">Session cache · Rate limit</text>
  <text x="500" y="495" text-anchor="middle" fill="#fecaca" font-family="monospace" font-size="9">BullMQ job queue</text>
  <text x="500" y="510" text-anchor="middle" fill="#fecaca" font-family="monospace" font-size="9">Pub/Sub · Real-time</text>

  <!-- Arrow: Railway -> DBs -->
  <line x1="500" y1="365" x2="500" y2="440" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="190" y1="365" x2="190" y2="440" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.4"/>
  <line x1="810" y1="365" x2="500" y2="440" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrow)" opacity="0.4"/>

  <!-- ==================== MONITORING ==================== -->
  <text x="700" y="420" fill="#6366f1" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="1">MONITORING</text>
  <line x1="700" y1="425" x2="820" y2="425" stroke="#6366f1" stroke-width="1" opacity="0.3"/>

  <rect x="680" y="440" width="220" height="45" rx="10" fill="url(#monitor)" filter="url(#shadow)"/>
  <text x="790" y="459" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12" font-weight="bold">📊 Prometheus</text>
  <text x="790" y="475" text-anchor="middle" fill="#fef3c7" font-family="monospace" font-size="9">Metrics collection</text>

  <rect x="680" y="500" width="220" height="45" rx="10" fill="url(#grafana)" filter="url(#shadow)"/>
  <text x="790" y="519" text-anchor="middle" fill="#fff" font-family="monospace" font-size="12" font-weight="bold">📈 Grafana</text>
  <text x="790" y="535" text-anchor="middle" fill="#ffedd5" font-family="monospace" font-size="9">Dashboards · Alerts</text>

  <!-- Arrow: deployment -> monitoring -->
  <line x1="680" y1="460" x2="680" y2="460" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" opacity="0.3"/>
  <line x1="500" y1="440" x2="680" y2="460" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowOrange)" opacity="0.35"/>
  <line x1="810" y1="365" x2="790" y2="440" stroke="#10b981" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowGreen)" opacity="0.35"/>
  <line x1="190" y1="440" x2="680" y2="460" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowOrange)" opacity="0.35"/>

  <!-- ==================== SUPPLEMENTARY ==================== -->
  <text x="70" y="595" fill="#6366f1" font-family="monospace" font-size="11" font-weight="bold" letter-spacing="1">ADDITIONAL SERVICES</text>
  <line x1="70" y1="600" x2="240" y2="600" stroke="#6366f1" stroke-width="1" opacity="0.3"/>

  <rect x="60" y="615" width="240" height="50" rx="8" fill="#1a1f3a" stroke="#3b82f6" stroke-width="1" filter="url(#shadow)"/>
  <text x="180" y="636" text-anchor="middle" fill="#60a5fa" font-family="monospace" font-size="10" font-weight="bold">🔐 Auth0 / Clerk</text>
  <text x="180" y="652" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Authentication provider</text>

  <rect x="320" y="615" width="240" height="50" rx="8" fill="#1a1f3a" stroke="#f59e0b" stroke-width="1" filter="url(#shadow)"/>
  <text x="440" y="636" text-anchor="middle" fill="#fbbf24" font-family="monospace" font-size="10" font-weight="bold">📧 SendGrid / Resend</text>
  <text x="440" y="652" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">Email notifications</text>

  <rect x="580" y="615" width="240" height="50" rx="8" fill="#1a1f3a" stroke="#ec4899" stroke-width="1" filter="url(#shadow)"/>
  <text x="700" y="636" text-anchor="middle" fill="#f472b6" font-family="monospace" font-size="10" font-weight="bold">🗄️ Supabase Storage</text>
  <text x="700" y="652" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="9">File &amp; asset storage</text>

  <!-- ==================== FLOW ARROWS (overall pipeline) ==================== -->
  <path d="M 160 280 Q 160 260 160 155" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,3" fill="none" opacity="0.3"/>
  <path d="M 500 280 Q 500 260 500 155" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,3" fill="none" opacity="0.3"/>
  <path d="M 810 280 Q 810 260 810 155" stroke="#6366f1" stroke-width="1" stroke-dasharray="4,3" fill="none" opacity="0.3"/>

  <!-- ==================== PIPELINE STAGE LABELS ==================== -->
  <text x="160" y="270" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8" letter-spacing="1">DEPLOY</text>
  <text x="500" y="270" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8" letter-spacing="1">DEPLOY</text>
  <text x="810" y="270" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8" letter-spacing="1">DEPLOY</text>

  <rect x="460" y="250" width="80" height="18" rx="6" fill="#1e2448" stroke="#2a2f4a" stroke-width="1"/>
  <text x="500" y="263" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="8">auto-deploy</text>

  <!-- Legend -->
  <rect x="60" y="700" width="1080" height="100" rx="10" fill="#1a1f3a" stroke="#2a2f4a" stroke-width="1" opacity="0.95"/>
  <text x="600" y="722" text-anchor="middle" fill="#e2e8f0" font-family="monospace" font-size="11" font-weight="bold">DEPLOYMENT PIPELINE</text>
  <line x1="100" y1="730" x2="1100" y2="730" stroke="#2a2f4a" stroke-width="1"/>

  <text x="600" y="752" text-anchor="middle" fill="#64748b" font-family="monospace" font-size="10">
    [ GitHub Push ]  ──▶  [ GitHub Actions ]  ──▶  [ Docker Build &amp; Push ]  ──▶  [ Deploy to Vercel / Railway / Render ]  ──▶  [ Monitoring ]
  </text>

  <text x="600" y="775" text-anchor="middle" fill="#475569" font-family="monospace" font-size="9">
    Dev ──▶ Lint &amp; Test ──▶ Build ──▶ Staging deploy ──▶ E2E Tests ──▶ Production deploy (main branch)
  </text>

</svg>