<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 120" width="720" height="120">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="120" fill="#0F172A" rx="16"/>

  <!-- MIT License badge -->
  <g transform="translate(20, 30)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#1E293B"/>
    <rect x="0" y="0" width="130" height="32" rx="16" fill="none" stroke="#334155" stroke-width="0.5"/>
    <rect x="0" y="0" width="36" height="32" rx="16" fill="url(#gradient)"/>
    <text x="18" y="21" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="10" fill="white" text-anchor="middle" font-weight="600">MIT</text>
    <text x="46" y="21" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#CBD5E1" font-weight="500">License</text>
  </g>

  <!-- TypeScript badge -->
  <g transform="translate(170, 30)">
    <rect x="0" y="0" width="140" height="32" rx="16" fill="#1E293B"/>
    <rect x="0" y="0" width="140" height="32" rx="16" fill="none" stroke="#334155" stroke-width="0.5"/>
    <rect x="0" y="0" width="36" height="32" rx="16" fill="#3178C6"/>
    <text x="18" y="21" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="600">TS</text>
    <text x="46" y="21" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#CBD5E1" font-weight="500">TypeScript</text>
  </g>

  <!-- Next.js badge -->
  <g transform="translate(330, 30)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#1E293B"/>
    <rect x="0" y="0" width="130" height="32" rx="16" fill="none" stroke="#334155" stroke-width="0.5"/>
    <rect x="0" y="0" width="36" height="32" rx="16" fill="url(#gradient)"/>
    <text x="18" y="21" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="white" text-anchor="middle" font-weight="600">N</text>
    <text x="46" y="21" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#CBD5E1" font-weight="500">Next.js</text>
  </g>

  <!-- PRs Welcome badge -->
  <g transform="translate(480, 30)">
    <rect x="0" y="0" width="150" height="32" rx="16" fill="#1E293B"/>
    <rect x="0" y="0" width="150" height="32" rx="16" fill="none" stroke="#334155" stroke-width="0.5"/>
    <rect x="0" y="0" width="36" height="32" rx="16" fill="url(#gradient)"/>
    <text x="18" y="21" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="8" fill="white" text-anchor="middle" font-weight="600">PR</text>
    <text x="46" y="21" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#CBD5E1" font-weight="500">PRs Welcome</text>
  </g>

  <!-- v1.0.0 badge -->
  <g transform="translate(650, 30)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="#06B6D4" opacity="0.1"/>
    <rect x="0" y="0" width="130" height="32" rx="16" fill="none" stroke="#06B6D4" stroke-width="0.5" opacity="0.3"/>
    <rect x="0" y="0" width="36" height="32" rx="16" fill="#06B6D4"/>
    <text x="18" y="21" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#0F172A" text-anchor="middle" font-weight="700">v</text>
    <text x="46" y="21" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#06B6D4" font-weight="600">v1.0.0</text>
  </g>

  <!-- Row 2: Description badges -->
  <g transform="translate(20, 78)">
    <rect x="0" y="0" width="160" height="28" rx="14" fill="#1E293B"/>
    <rect x="0" y="0" width="160" height="28" rx="14" fill="none" stroke="#334155" stroke-width="0.5"/>
    <text x="80" y="18" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle" font-weight="400">🚀 AI Agent Framework</text>
  </g>
  <g transform="translate(195, 78)">
    <rect x="0" y="0" width="150" height="28" rx="14" fill="#1E293B"/>
    <rect x="0" y="0" width="150" height="28" rx="14" fill="none" stroke="#334155" stroke-width="0.5"/>
    <text x="75" y="18" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle" font-weight="400">⚡ Built for Scale</text>
  </g>
  <g transform="translate(360, 78)">
    <rect x="0" y="0" width="150" height="28" rx="14" fill="#1E293B"/>
    <rect x="0" y="0" width="150" height="28" rx="14" fill="none" stroke="#334155" stroke-width="0.5"/>
    <text x="75" y="18" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle" font-weight="400">🔒 Type Safe</text>
  </g>
  <g transform="translate(525, 78)">
    <rect x="0" y="0" width="155" height="28" rx="14" fill="#1E293B"/>
    <rect x="0" y="0" width="155" height="28" rx="14" fill="none" stroke="#334155" stroke-width="0.5"/>
    <text x="77.5" y="18" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#94A3B8" text-anchor="middle" font-weight="400">📦 Zero Config</text>
  </g>
</svg>
