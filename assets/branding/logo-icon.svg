<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#iconGrad)" stroke-width="4"/>
  <!-- Inner glow ring -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="url(#iconGrad)" stroke-width="1.5" opacity="0.3"/>
  <!-- Inner core -->
  <circle cx="50" cy="50" r="18" fill="url(#iconGrad)" opacity="0.12"/>
  <!-- Outer ring nodes (gear teeth) -->
  <circle cx="50" cy="7" r="3.5" fill="#6366F1"/>
  <circle cx="50" cy="93" r="3.5" fill="#8B5CF6"/>
  <circle cx="7" cy="50" r="3.5" fill="#6366F1"/>
  <circle cx="93" cy="50" r="3.5" fill="#8B5CF6"/>
  <!-- Corner nodes -->
  <circle cx="22.5" cy="22.5" r="2.5" fill="#06B6D4"/>
  <circle cx="77.5" cy="77.5" r="2.5" fill="#06B6D4"/>
  <circle cx="22.5" cy="77.5" r="2.5" fill="#06B6D4"/>
  <circle cx="77.5" cy="22.5" r="2.5" fill="#06B6D4"/>
  <!-- Circuit traces (diagonal connections) -->
  <line x1="50" y1="10.5" x2="50" y2="32" stroke="#6366F1" stroke-width="2.5" opacity="0.5"/>
  <line x1="50" y1="68" x2="50" y2="89.5" stroke="#8B5CF6" stroke-width="2.5" opacity="0.5"/>
  <line x1="10.5" y1="50" x2="32" y2="50" stroke="#6366F1" stroke-width="2.5" opacity="0.5"/>
  <line x1="68" y1="50" x2="89.5" y2="50" stroke="#8B5CF6" stroke-width="2.5" opacity="0.5"/>
  <!-- Inner circuit traces -->
  <line x1="50" y1="32" x2="50" y2="42" stroke="#06B6D4" stroke-width="2" opacity="0.6"/>
  <line x1="50" y1="58" x2="50" y2="68" stroke="#06B6D4" stroke-width="2" opacity="0.6"/>
  <line x1="32" y1="50" x2="42" y2="50" stroke="#06B6D4" stroke-width="2" opacity="0.6"/>
  <line x1="58" y1="50" x2="68" y2="50" stroke="#06B6D4" stroke-width="2" opacity="0.6"/>
  <!-- Center core -->
  <circle cx="50" cy="50" r="6" fill="url(#iconGrad)"/>
  <!-- Center highlight -->
  <circle cx="48" cy="48" r="2" fill="white" opacity="0.4"/>
</svg>
